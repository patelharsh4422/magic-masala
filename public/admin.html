<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Masala - Admin Dashboard</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0a04;
  --bg2:#160c03;
  --bg3:#1e1106;
  --bg4:#251508;
  --panel:#2a1a08;
  --gold:#c8960a;
  --gold2:#d9a50e;
  --text:#fff;
  --text-soft:rgba(255,255,255,.86);
  --muted:rgba(255,255,255,.46);
  --border:rgba(255,255,255,.08);
  --green:#22c55e;
  --red:#ef4444;
  --blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
body{background:
  radial-gradient(circle at top, rgba(200,150,10,.14), transparent 38%),
  linear-gradient(180deg, #140b04 0%, #0d0703 100%)}
button,input,textarea,select{font:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:999px}

.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:20}
.login-screen.hide{display:none}
.login-bg{position:absolute;inset:0;background:
  radial-gradient(circle at 50% 0%, rgba(200,150,10,.18), transparent 45%),
  radial-gradient(circle at 0% 100%, rgba(217,165,14,.08), transparent 35%)}
.login-card{position:relative;z-index:1;width:min(100%,420px);background:rgba(30,17,6,.95);border:1px solid rgba(200,150,10,.24);border-radius:22px;padding:38px 34px;box-shadow:0 32px 80px rgba(0,0,0,.55)}
.login-icon{display:flex;justify-content:center;margin-bottom:16px;color:var(--gold)}
.login-icon svg{width:46px;height:46px}
.login-logo{display:block;font-family:'Playfair Display',serif;font-size:1.6rem;text-align:center;color:var(--gold)}
.login-sub{margin:6px 0 28px;text-align:center;color:var(--muted);font-size:.86rem}
.l-err,.hc-err{display:none;border-radius:10px;padding:10px 12px;font-size:.84rem;margin-bottom:14px}
.l-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.26);color:#fecaca;text-align:center}
.hc-err{color:#fecaca;padding:0 4px 12px}
.l-group{margin-bottom:16px}
.l-label{display:block;margin-bottom:8px;font-size:.84rem;color:var(--text-soft);font-weight:500}
.l-inp,.captcha-inp{width:100%;background:var(--panel);border:1px solid var(--border);color:#fff;border-radius:10px;padding:12px 14px;outline:none;transition:border-color .2s, box-shadow .2s}
.l-inp:focus,.captcha-inp:focus{border-color:rgba(200,150,10,.55);box-shadow:0 0 0 3px rgba(200,150,10,.12)}
.l-inp::placeholder,.captcha-inp::placeholder{color:rgba(255,255,255,.22)}
.captcha-wrap{margin-bottom:16px}
.captcha-label{display:block;margin-bottom:8px;font-size:.84rem;color:var(--text-soft)}
.captcha-row{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.captcha-canvas{flex:1;max-width:180px;border:1px solid var(--border);border-radius:10px;background:#111}
.captcha-refresh{width:48px;height:48px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s,border-color .2s}
.captcha-refresh:hover{transform:rotate(15deg);border-color:rgba(200,150,10,.35)}
.captcha-refresh svg{width:18px;height:18px}
.l-btn,.back-btn,.refresh-btn,.logout-btn,.tab,.fpill{cursor:pointer;transition:all .2s}
.l-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#fff;padding:13px 14px;border-radius:11px;font-weight:600;margin-top:6px}
.l-btn:hover{box-shadow:0 10px 26px rgba(200,150,10,.25)}
.l-btn:disabled{box-shadow:none}
.back-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:11px 14px;border-radius:11px;margin-top:10px}
.back-btn:hover{color:var(--text-soft);border-color:rgba(255,255,255,.16)}
.back-btn svg{width:15px;height:15px}

.app{display:none;height:100vh;flex-direction:column}
.app.show{display:flex}
.topbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;background:rgba(30,17,6,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.topbar-left,.topbar-right,.live-indicator{display:flex;align-items:center}
.topbar-left{gap:14px}
.topbar-right{gap:10px}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.28rem;color:var(--gold)}
.topbar-badge{padding:4px 10px;border-radius:999px;background:var(--bg4);border:1px solid var(--border);font-size:.74rem;color:var(--muted)}
.live-indicator{gap:8px;font-size:.82rem}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(34,197,94,.55);animation:pulse 2s infinite}
.live-dot.off{background:var(--red);box-shadow:none;animation:none}
.live-txt{color:var(--green)}
.live-txt.off{color:var(--red)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
.refresh-btn,.logout-btn{padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--panel);color:var(--text-soft);display:flex;align-items:center;gap:7px}
.refresh-btn:hover{background:var(--gold);border-color:var(--gold);color:#fff}
.logout-btn:hover{border-color:rgba(239,68,68,.45);color:#fca5a5}
.refresh-btn svg,.logout-btn svg{width:14px;height:14px}
.refresh-btn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.main{flex:1;overflow:auto;padding:24px 28px 32px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat{display:flex;align-items:center;gap:14px;padding:18px 20px;background:rgba(30,17,6,.92);border:1px solid var(--border);border-radius:16px}
.stat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.stat-icon svg{width:22px;height:22px}
.si-gold{background:rgba(200,150,10,.14);color:var(--gold)}
.si-green{background:rgba(34,197,94,.14);color:var(--green)}
.si-blue{background:rgba(59,130,246,.14);color:var(--blue)}
.si-purple{background:rgba(168,85,247,.14);color:#a855f7}
.stat-val{font-family:'Playfair Display',serif;font-size:1.8rem;line-height:1}
.stat-lbl{margin-top:4px;font-size:.78rem;color:var(--muted)}

.tabs-row,.filter-row{display:flex;flex-wrap:wrap;gap:8px}
.tabs-row{margin-bottom:18px}
.filter-row{margin-bottom:18px;align-items:center}
.filter-label{font-size:.82rem;color:var(--muted);margin-right:2px}
.tab,.fpill{border-radius:999px;border:1px solid var(--border);background:rgba(30,17,6,.92);color:var(--muted)}
.tab{padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:.85rem}
.tab.active{background:var(--gold);border-color:var(--gold);color:#fff}
.tab-badge{padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.16);font-size:.72rem;font-weight:700}
.fpill{padding:7px 12px;font-size:.78rem}
.fpill.active{background:rgba(200,150,10,.14);border-color:rgba(200,150,10,.4);color:var(--gold)}

.table-card{background:rgba(30,17,6,.92);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.table-card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.table-card-title{display:flex;align-items:center;gap:8px;font-weight:600}
.table-card-count{color:var(--muted);font-size:.8rem}
.tbl{width:100%;border-collapse:collapse;font-size:.83rem}
.tbl th{padding:12px 14px;background:var(--bg4);color:var(--gold);text-align:left;text-transform:uppercase;letter-spacing:.05em;font-size:.74rem;border-bottom:1px solid var(--border)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text-soft);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(200,150,10,.04)}
.badge-new,.badge-done{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:.72rem;font-weight:700}
.badge-new{background:rgba(200,150,10,.14);color:var(--gold)}
.badge-done{background:rgba(34,197,94,.14);color:var(--green)}
.empty-state{text-align:center;padding:58px 18px;color:var(--muted)}
.empty-state svg{width:42px;height:42px;color:rgba(200,150,10,.22);margin-bottom:10px}

.alert-banner{display:none;position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:30;background:var(--green);color:#fff;padding:12px 22px;border-radius:999px;font-size:.88rem;font-weight:600;box-shadow:0 14px 36px rgba(34,197,94,.28);align-items:center;gap:10px}
.alert-banner.show{display:flex}
.alert-banner svg{width:18px;height:18px}
.toast{position:fixed;right:18px;bottom:18px;z-index:30;max-width:300px;background:rgba(30,17,6,.96);border:1px solid rgba(200,150,10,.28);border-radius:12px;padding:12px 14px;transform:translateY(90px);opacity:0;transition:transform .25s,opacity .25s}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:980px){.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){
  .topbar{padding:0 16px}
  .main{padding:16px 14px 24px}
  .stats-row{grid-template-columns:1fr 1fr;gap:10px}
  .stat{padding:14px}
  .stat-val{font-size:1.4rem}
  .topbar-badge{display:none}
}
@media(max-width:560px){
  html,body{overflow:auto}
  .topbar{height:auto;padding:14px;align-items:flex-start;gap:12px;flex-direction:column}
  .topbar-right{width:100%}
  .refresh-btn,.logout-btn{flex:1;justify-content:center}
  .stats-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <span class="login-logo">Magic Masala</span>
    <div class="login-sub">Owner Dashboard - Secure Login</div>
    <div class="l-err" id="l-err">Invalid username or password. Try again.</div>
    <div class="l-group">
      <label class="l-label">Admin Username</label>
      <input id="l-id" class="l-inp" type="text" placeholder="Enter admin username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="l-group">
      <label class="l-label">Password</label>
      <input id="l-pw" class="l-inp" type="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

      <label class="captcha-label">Enter the code shown below <span style="color:#e05252">*</span></label>
      <div class="captcha-row">
        <canvas class="captcha-canvas" id="captcha-canvas" width="180" height="52"></canvas>
        <button type="button" class="captcha-refresh" onclick="generateCaptcha()" title="Refresh code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>

      <input id="captcha-inp" class="captcha-inp" type="text" placeholder="Type the code here..." maxlength="6" autocomplete="off">

    </div>
    <button class="l-btn" id="login-btn" onclick="doLogin()">Login to Dashboard</button>
    <button class="back-btn" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Website
    </button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Magic Masala</span>
      <span class="topbar-badge">Owner Dashboard</span>
      <div class="live-indicator">
        <div class="live-dot" id="live-dot"></div>
        <span class="live-txt" id="live-txt">Live</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>

      </button>

  <div class="main">

      <div class="stat"><div class="stat-icon si-gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="stat-val" id="s-bookings">-</div><div class="stat-lbl">Total Bookings</div></div></div>
      <div class="stat"><div class="stat-icon si-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div><div><div class="stat-val" id="s-orders">-</div><div class="stat-lbl">Total Orders</div></div></div>

    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="table-title">Table Bookings</span>

<div class="alert-banner" id="alert-banner">

<div class="toast" id="toast"></div>

<script>
let currentTab = 'bookings';
let currentFilter = 'all';
let allData = { bookings: [], orders: [], messages: [] };
let socket;
let captchaCode = '';
let loginBusy = false;
let alertTimer;
let toastTimer;

function clearLoginErrors() {
  document.getElementById('l-err').style.display = 'none';
  document.getElementById('hc-err').style.display = 'none';
}

function setAuthState(authenticated) {
  document.getElementById('login-screen').classList.toggle('hide', authenticated);
  document.getElementById('app').classList.toggle('show', authenticated);
}

function setLoginBusy(isBusy) {
  loginBusy = isBusy;
  const button = document.getElementById('login-btn');
  button.disabled = isBusy;
  button.textContent = isBusy ? 'Signing in...' : 'Login to Dashboard';
  button.style.opacity = isBusy ? '.75' : '1';
  button.style.cursor = isBusy ? 'not-allowed' : 'pointer';
}

async function fetchJson(url, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (options.body && !headers['Content-Type']) {
    headers['Content-Type'] = 'application/json';
  }

  const response = await fetch(url, {
    credentials: 'same-origin',
    ...options,
    headers
  });

  const contentType = response.headers.get('content-type') || '';
  const payload = contentType.includes('application/json') ? await response.json() : null;

  if (response.status === 401) {
    handleSessionExpired();
    throw new Error(payload?.error || 'Your admin session has expired.');
  }

  if (!response.ok) {
    const validationMessage = payload?.errors?.[0]?.message;
    throw new Error(validationMessage || payload?.error || payload?.message || 'Request failed.');
  }

  return payload;
}

function generateCaptcha() {
  const canvas = document.getElementById('captcha-canvas');
  const ctx = canvas.getContext('2d');
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  captchaCode = '';

  for (let i = 0; i < 5; i++) {
    captchaCode += chars[Math.floor(Math.random() * chars.length)];
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
  gradient.addColorStop(0, '#0d0d0d');
  gradient.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.arc(Math.random() * 180, Math.random() * 52, 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${100 + Math.random() * 100},${100 + Math.random() * 100},${100 + Math.random() * 100},0.4)`;
    ctx.fill();
  }

  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(Math.random() * 180, Math.random() * 52);
    ctx.lineTo(Math.random() * 180, Math.random() * 52);
    ctx.strokeStyle = 'rgba(150,150,150,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  const colors = ['#c8960a', '#4A90D9', '#e87c3e', '#7ed4a0', '#e879a0', '#a78bfa'];
  ctx.font = 'bold 26px monospace';
  ctx.textBaseline = 'middle';

  for (let i = 0; i < captchaCode.length; i++) {
    ctx.save();
    const x = 20 + i * 30;
    const y = 26 + (Math.random() * 5 - 2.5);
    const angle = (Math.random() - 0.5) * 0.4;
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.fillText(captchaCode[i], 0, 0);

    if (Math.random() > 0.5) {
      ctx.beginPath();
      ctx.moveTo(-8, 0);
      ctx.lineTo(18, 0);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();
  }

  document.getElementById('captcha-inp').value = '';
  document.getElementById('hc-err').style.display = 'none';
}

function doLogin() {
  if (loginBusy) return;

  const username = document.getElementById('l-id').value.trim();
  const password = document.getElementById('l-pw').value;
  const captchaInput = document.getElementById('captcha-inp').value.trim().toUpperCase();

  clearLoginErrors();

  if (!captchaInput) {
    document.getElementById('hc-err').style.display = 'block';
    document.getElementById('hc-err').textContent = 'Please enter the CAPTCHA code.';
    return;
  }

  if (captchaInput !== captchaCode) {
    document.getElementById('hc-err').style.display = 'block';
    document.getElementById('hc-err').textContent = 'Incorrect code. Please try again.';
    generateCaptcha();
    return;
  }

  setLoginBusy(true);

  fetchJson('/admin/login', {
    method: 'POST',
    body: JSON.stringify({ username, password })
  })
    .then(() => {
      window.location.href = '/admin';
    })
    .catch((error) => {
      document.getElementById('l-err').style.display = 'block';
      document.getElementById('l-err').textContent = error.message || 'Login failed. Please try again.';
      document.getElementById('l-pw').value = '';
      document.getElementById('l-pw').focus();
      generateCaptcha();
    })
    .finally(() => {
      setLoginBusy(false);
    });
}

function handleSessionExpired() {
  if (socket) {
    socket.disconnect();
    socket = null;
  }

  setAuthState(false);
  clearLoginErrors();
  generateCaptcha();
}

async function logout() {
  try {
    await fetchJson('/admin/logout', { method: 'POST' });
  } catch (error) {}

  handleSessionExpired();
  window.location.href = '/admin/login';
}

function setLive(isLive) {
  document.getElementById('live-dot').className = 'live-dot' + (isLive ? '' : ' off');
  const liveText = document.getElementById('live-txt');
  liveText.textContent = isLive ? 'Live' : 'Disconnected';
  liveText.className = 'live-txt' + (isLive ? '' : ' off');
}

function initSocket() {
  if (socket) return;

  socket = io({ withCredentials: true });

  socket.on('connect', () => {
    setLive(true);
  });

  socket.on('disconnect', () => {
    setLive(false);
  });

  socket.on('connect_error', (error) => {
    setLive(false);
    if (error && /unauthorized/i.test(error.message)) {
      handleSessionExpired();
      window.location.href = '/admin/login';
    }
  });

  socket.on('new_booking', (booking) => {
    allData.bookings.unshift(booking);
    updateStats();
    if (currentTab === 'bookings') renderTable();
    showAlert(`New booking from ${booking.name} - ${booking.guests} on ${booking.date}`);
    playAlert();
    showToast('New table booking received!');
  });

  socket.on('new_order', (order) => {
    allData.orders.unshift(order);
    updateStats();
    if (currentTab === 'orders') renderTable();
    showAlert(`New order from ${order.name} - Rs. ${order.total}`);
    playAlert();
    showToast('New order received!');
  });

  socket.on('new_message', (message) => {
    allData.messages.unshift(message);
    updateStats();
    if (currentTab === 'messages') renderTable();
    showToast('New message from ' + message.name);
  });
}

async function loadAll() {
  const button = document.getElementById('refresh-btn');
  button.classList.add('spin');

  try {
    const [bookings, orders, messages, stats] = await Promise.all([
      fetchJson('/api/bookings'),
      fetchJson('/api/orders'),
      fetchJson('/api/messages'),
      fetchJson('/api/stats')
    ]);

    allData.bookings = bookings;
    allData.orders = orders;
    allData.messages = messages;

    document.getElementById('s-bookings').textContent = stats.bookings;
    document.getElementById('s-orders').textContent = stats.orders;
    document.getElementById('s-messages').textContent = stats.messages;
    document.getElementById('s-revenue').textContent = 'Rs.' + stats.revenue;
    document.getElementById('tb-b').textContent = bookings.length;
    document.getElementById('tb-o').textContent = orders.length;
    document.getElementById('tb-m').textContent = messages.length;
    renderTable();
  } catch (error) {
    if (!/session has expired/i.test(error.message || '')) {
      showToast(error.message || 'Could not load data.');
    }
  }

  button.classList.remove('spin');
}

async function refreshAll() {
  await loadAll();
  showToast('Dashboard refreshed!');
}

function updateStats() {
  document.getElementById('s-bookings').textContent = allData.bookings.length;
  document.getElementById('s-orders').textContent = allData.orders.length;
  document.getElementById('s-messages').textContent = allData.messages.length;
  document.getElementById('s-revenue').textContent = 'Rs.' + allData.orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
  document.getElementById('tb-b').textContent = allData.bookings.length;
  document.getElementById('tb-o').textContent = allData.orders.length;
  document.getElementById('tb-m').textContent = allData.messages.length;
}

function switchTab(tab, element) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((tabButton) => tabButton.classList.remove('active'));
  element.classList.add('active');
  document.getElementById('filter-row').style.display = tab === 'bookings' ? 'flex' : 'none';

  const icons = {
    bookings: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    orders: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>',
    messages: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'
  };
  const titles = { bookings: 'Table Bookings', orders: 'Orders', messages: 'Messages' };
  document.getElementById('table-title').innerHTML = icons[tab] + ' ' + titles[tab];
  renderTable();
}

function setFilter(filter, element) {
  currentFilter = filter;
  document.querySelectorAll('.fpill').forEach((pill) => pill.classList.remove('active'));
  element.classList.add('active');
  renderTable();
}

function applyFilter(data) {
  if (currentTab !== 'bookings') return data;

  const now = new Date();
  if (currentFilter === 'recent') return data.slice(0, 3);

  return data.filter((item) => {
    if (!item.createdAt) return true;
    const createdAt = new Date(item.createdAt);

    if (currentFilter === 'today') return createdAt.toDateString() === now.toDateString();
    if (currentFilter === 'week') {
      const weekAgo = new Date(now);
      weekAgo.setDate(now.getDate() - 7);
      return createdAt >= weekAgo;
    }
    if (currentFilter === 'month') {
      const monthAgo = new Date(now);
      monthAgo.setDate(now.getDate() - 30);
      return createdAt >= monthAgo;
    }

    return true;
  });
}

function renderTable() {
  const body = document.getElementById('table-body');
  const data = applyFilter(allData[currentTab] || []);
  const labels = { all: 'All', today: 'Today', week: 'This Week', month: 'This Month', recent: 'Recent (3)' };
  document.getElementById('table-count').textContent = data.length + ' record' + (data.length !== 1 ? 's' : '') + (currentTab === 'bookings' && currentFilter !== 'all' ? ' · ' + labels[currentFilter] : '');

  if (!data.length) {
    body.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 17H7A5 5 0 017 7h1M15 7h1a5 5 0 010 10h-1M12 12h.01"/></svg><p>No records found</p></div>`;
    return;
  }

  if (currentTab === 'bookings') {
    body.innerHTML = `<table class="tbl">
      <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Date</th><th>Time</th><th>Guests</th><th>Special</th><th>Status</th><th>Received At</th></tr></thead>
      <tbody>${data.map((booking, index) => `<tr>
        <td style="color:var(--muted)">${index + 1}</td>
        <td><strong>${booking.name}</strong></td>
        <td>${booking.phone}</td>
        <td style="font-size:.77rem;color:var(--muted)">${booking.email || '-'}</td>
        <td style="white-space:nowrap">${booking.date}</td>
        <td style="white-space:nowrap">${booking.time}</td>
        <td>${booking.guests}</td>
        <td style="max-width:140px;font-size:.78rem;color:var(--muted)">${booking.special || '-'}</td>
        <td><span class="${booking.status === 'Done' ? 'badge-done' : 'badge-new'}">${booking.status}</span></td>
        <td style="white-space:nowrap;font-size:.76rem;color:var(--muted)">${fmtDate(booking.createdAt)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
    return;
  }

  if (currentTab === 'orders') {
    body.innerHTML = `<table class="tbl">
      <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Address</th><th>Items Ordered</th><th>Total</th><th>Status</th><th>Ordered At</th></tr></thead>
      <tbody>${data.map((order, index) => `<tr>
        <td style="color:var(--muted)">${index + 1}</td>
        <td><strong>${order.name}</strong></td>
        <td>${order.phone}</td>
        <td style="max-width:220px;font-size:.79rem">${order.address || '-'}</td>
        <td style="max-width:220px;font-size:.79rem">${order.items}</td>
        <td style="color:var(--gold);font-weight:600">Rs.${order.total}</td>
        <td><span class="${order.status === 'Done' ? 'badge-done' : 'badge-new'}">${order.status}</span></td>
        <td style="white-space:nowrap;font-size:.76rem;color:var(--muted)">${fmtDate(order.createdAt)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
    return;
  }

  body.innerHTML = `<table class="tbl">
    <thead><tr><th>#</th><th>Name</th><th>Message</th><th>Status</th><th>Sent At</th></tr></thead>
    <tbody>${data.map((message, index) => `<tr>
      <td style="color:var(--muted)">${index + 1}</td>
      <td><strong>${message.name}</strong></td>
      <td style="max-width:340px">${message.message}</td>
      <td><span class="${message.status === 'Done' ? 'badge-done' : 'badge-new'}">${message.status}</span></td>
      <td style="white-space:nowrap;font-size:.76rem;color:var(--muted)">${fmtDate(message.createdAt)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function fmtDate(value) {
  if (!value) return '-';
  try {
    return new Date(value).toLocaleString('en-IN', {
      day: '2-digit',
      month: 'short',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  } catch (error) {
    return value;
  }
}

function showAlert(message) {
  const element = document.getElementById('alert-banner');
  document.getElementById('alert-text').textContent = message;
  element.classList.add('show');
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => element.classList.remove('show'), 5000);
}

function showToast(message) {
  const element = document.getElementById('toast');
  element.textContent = message;
  element.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => element.classList.remove('show'), 3000);
}

function playAlert() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.6);
  } catch (error) {}
}

async function bootstrapAdmin() {
  try {
    const session = await fetchJson('/admin/session');
    if (session && session.authenticated) {
      setAuthState(true);
      initSocket();
      await loadAll();
      return;
    }
  } catch (error) {}

  setAuthState(false);
  generateCaptcha();
  document.getElementById('l-id').focus();
}

window.onload = bootstrapAdmin;
</script>
</body>
